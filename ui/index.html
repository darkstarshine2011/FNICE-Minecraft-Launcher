<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNICE Launcher - Fullscreen Elite</title>
    <style>
        :root {
            --pure-blue: rgb(0, 0, 255);
            --bg-gradient: linear-gradient(135deg, rgb(0, 0, 255) 0%, #000000 100%);
            --sidebar-gradient: linear-gradient(to bottom, rgba(0, 0, 255, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            --accent-gold: #ecc94b;
            --accent-gold-hover: #f6e05e;
            --badlion-border: rgba(236, 201, 75, 0.5);
            --text-light: #f7fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            user-select: none;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sidebar {
            width: 380px;
            height: 100%;
            background: var(--sidebar-gradient);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 2px solid var(--accent-gold);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
            z-index: 10;
            box-shadow: 15px 0 50px rgba(0, 0, 0, 0.8);
        }

        .account-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--badlion-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 10px;
        }

        .account-display-box {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--badlion-border);
        }

        .form-group {
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            color: var(--accent-gold);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
            opacity: 0.9;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--badlion-border);
            color: var(--text-light);
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: var(--accent-gold);
            outline: none;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        .btn-secondary {
            background: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            color: #000;
            padding: 12px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--accent-gold-hover);
            box-shadow: 0 0 12px var(--accent-gold);
        }

        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 0;
            z-index: 5;
        }

        .client-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 10;
            margin-top: auto;
            margin-bottom: 40px;
        }

        .client-logo-img {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(236, 201, 75, 0.5));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .client-logo-area h1 {
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--text-light);
        }

        .client-logo-area h1 span {
            color: var(--accent-gold);
            text-shadow: 0 0 25px rgba(236, 201, 75, 0.5);
        }

        .bottom-controls {
            width: 500px;
            z-index: 10;
            text-align: center;
            margin-bottom: auto;
        }

        .btn-launch {
            width: 100%;
            background: linear-gradient(to right, #cc9a06, var(--accent-gold), #cc9a06);
            background-size: 200% auto;
            color: #040812;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 4px;
            padding: 24px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            transition: 0.5s;
            box-shadow: 0 10px 40px rgba(236, 201, 75, 0.3);
        }

        .btn-launch:hover {
            background-position: right center;
            box-shadow: 0 15px 50px rgba(236, 201, 75, 0.5);
            transform: scale(1.02);
        }

        .btn-launch:disabled {
            background: #555 !important;
            color: #888 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gold);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px var(--accent-gold);
        }

        #status-msg {
            margin-top: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="sidebar">
        <div class="sidebar-top">
            <div class="account-section">
                <div class="account-display-box">
                    <i class="fas fa-crown"></i>
                    <span id="display-username">PlayerName</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <label>Account Name</label>
                    <input type="text" id="username-input" placeholder="IGN..." value="PlayerName">
                    <button class="btn-secondary" onclick="saveAccount()">Update IGN</button>
                </div>
            </div>

            <div class="form-group">
                <label>Game Version</label>
                <select id="game-version"></select>
            </div>

            <div class="form-group">
                <label>Mod Loader</label>
                <select id="loader-type" onchange="handleLoaderChange()">
                    <option value="vanilla">Vanilla</option>
                    <option value="fabric">Fabric</option>
                    <option value="forge">Forge</option>
                    <option value="neoforge">NeoForge</option>
                </select>
            </div>

            <div class="form-group" id="loader-version-container" style="visibility: hidden;">
                <label>Loader Version</label>
                <select id="loader-version">
                    <option>Loading...</option>
                </select>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="client-logo-area">
            <img src="logo.png" class="client-logo-img" alt="Logo">
            <h1>FNICE <span>LAUNCHER</span></h1>
        </div>

        <div class="bottom-controls">
            <button id="launch-trigger" class="btn-launch" onclick="executeLaunch()">Launch Game</button>
            <div class="progress-track" id="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="status-msg">Ready to Play</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

                ctx.fillStyle = 'rgba(236, 201, 75, 0.4)';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();

                particles.forEach(p2 => {
                    const dx = p.x - p2.x; const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) {
                        ctx.strokeStyle = `rgba(236, 201, 75, ${0.2 - dist/1200})`;
                        ctx.lineWidth = 0.5; ctx.beginPath();
                        ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }
        initCanvas(); animate();
        window.addEventListener('resize', initCanvas);

        const savedUser = localStorage.getItem("launcher_username") || "FNICE_Player";
        document.getElementById('username-input').value = savedUser;
        document.getElementById('display-username').textContent = savedUser;

        window.addEventListener('pywebviewready', async () => {
            try {
                const raw = await window.pywebview.api.get_versions();
                const versions = JSON.parse(raw);
                const select = document.getElementById('game-version');
                select.innerHTML = versions.map(v => `<option value="${v}">${v}</option>`).join('');
            } catch (error) {
                console.error(error);
            }
        });

        function saveAccount() {
            const val = document.getElementById('username-input').value.trim();
            if(val) {
                localStorage.setItem("launcher_username", val);
                document.getElementById('display-username').textContent = val;
            } else {
                alert("Please enter a valid username!");
            }
        }

        async function handleLoaderChange() {
            const loader = document.getElementById('loader-type').value;
            const container = document.getElementById('loader-version-container');
            const loaderSelect = document.getElementById('loader-version');

            if (loader === 'vanilla') { 
                container.style.visibility = 'hidden'; 
                return; 
            }

            container.style.visibility = 'visible';
            loaderSelect.innerHTML = '<option>Loading...</option>';

            const mcVersion = document.getElementById('game-version').value;
            const raw = await window.pywebview.api.get_modloader_versions(mcVersion, loader);
            const versions = JSON.parse(raw);

            loaderSelect.innerHTML = versions.length === 0
                ? '<option>No versions found</option>'
                : versions.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        async function executeLaunch() {
            const username = document.getElementById('username-input').value.trim();
            const mcVersion = document.getElementById('game-version').value;
            const modloader = document.getElementById('loader-type').value;
            const modloaderVer = document.getElementById('loader-version').value;

            if (!username) { alert('Please enter a username!'); return; }
            
            localStorage.setItem("launcher_username", username);
            document.getElementById('launch-trigger').disabled = true;

            await window.pywebview.api.install_and_launch(
                mcVersion,
                modloader,
                modloaderVer,
                username
            );
        }

        function updateStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
        }

        function updateProgress(val) {
            const bar = document.getElementById('progress-fill');
            const max = parseInt(bar.dataset.max || 100);
            bar.style.width = (val / max * 100) + '%'
        }

        function setMaxProgress(val) {
            document.getElementById('progress-fill').dataset.max = val;
        }

        function onLaunched() {
            document.getElementById('status-msg').innerText = '✅ Game Started Successfully!';
            document.getElementById('launch-trigger').disabled = false;
            document.getElementById('progress-fill').style.width = '100%';
        }
    </script>
</body>
</html>
